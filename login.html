<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Tech Login</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #dbeafe, #eff6ff);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .login-page {
      width: 92%;
      max-width: 1100px;
      height: 620px;
      background: white;
      border-radius: 18px;
      display: grid;
      grid-template-columns: 58% 42%;
      overflow: hidden;
      box-shadow: 0 25px 70px rgba(37,99,235,0.22);
      position: relative;
    }

    .brand-panel {
      position: relative;
      overflow: hidden;
      padding: 70px 60px;
      background: linear-gradient(135deg, #e0f2fe, #bfdbfe);
    }

    .blob {
      position: absolute;
      border-radius: 45% 55% 60% 40%;
      animation: float 6s ease-in-out infinite;
      opacity: 0.95;
    }

    .blob.one {
      width: 330px;
      height: 330px;
      background: #38bdf8;
      left: -120px;
      bottom: -80px;
    }

    .blob.two {
      width: 310px;
      height: 360px;
      background: #2563eb;
      right: -80px;
      top: -90px;
      animation-delay: 1s;
    }

    .blob.three {
      width: 180px;
      height: 180px;
      background: #93c5fd;
      right: 140px;
      bottom: 50px;
      animation-delay: 2s;
    }

    .dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2563eb;
      animation: bounce 3s infinite;
    }

    .dot.d1 { top: 55px; left: 130px; }
    .dot.d2 { top: 95px; left: 310px; background:#38bdf8; animation-delay:.5s; }
    .dot.d3 { bottom: 90px; left: 240px; background:#0ea5e9; animation-delay:1s; }

    .curve {
      position: absolute;
      width: 180px;
      height: 80px;
      border-top: 2px solid rgba(15,23,42,0.25);
      border-radius: 50%;
      top: 40px;
      left: 80px;
      transform: rotate(12deg);
    }

    .brand-content {
      position: relative;
      z-index: 5;
      max-width: 390px;
    }

    .brand-title {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .brand-title span {
      color: #2563eb;
    }

    .brand-subtitle {
      color: #475569;
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 70px;
    }

    .welcome-left {
      font-size: 34px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 14px;
    }

    .welcome-text {
      color: #475569;
      font-size: 16px;
      line-height: 1.6;
      max-width: 330px;
    }

    .decor-line {
      margin-top: 35px;
      width: 75px;
      height: 4px;
      border-radius: 20px;
      background: #2563eb;
    }

    .login-panel {
      padding: 70px 55px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(255,255,255,0.96);
      position: relative;
      z-index: 10;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 18px;
    }

    .login-logo img {
      width: 180px;
      max-width: 180px;
      height: auto;
      object-fit: contain;
    }

    .login-panel h1 {
      text-align: center;
      font-size: 30px;
      color: #111827;
      margin: 0;
    }

    .login-panel p {
      text-align: center;
      color: #64748b;
      margin: 10px 0 35px;
      font-size: 15px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 7px;
      display: block;
    }

    .input-box {
      position: relative;
      margin-bottom: 20px;
    }

    .input-icon {
      position: absolute;
      top: 41px;
      left: 16px;
      color: #2563eb;
    }

    .input-box input {
      width: 100%;
      height: 48px;
      padding: 0 15px 0 46px;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      outline: none;
      font-size: 14px;
      transition: .2s;
    }

    .input-box input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    .login-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 24px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      color: white;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: .25s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(37,99,235,.35);
    }

    .footer-text {
      text-align: center;
      margin-top: 30px;
      color: #64748b;
      font-size: 13px;
    }

    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-18px) rotate(4deg); }
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @media (max-width: 850px) {
      body { overflow: auto; }

      .login-page {
        width: 94%;
        height: auto;
        grid-template-columns: 1fr;
      }

      .brand-panel {
        min-height: 300px;
        padding: 45px 30px;
      }

      .brand-subtitle {
        margin-bottom: 35px;
      }

      .login-panel {
        padding: 40px 25px;
      }
    }
  </style>
</head>

<body>

<div class="login-page">

  <div class="brand-panel">
    <div class="blob one"></div>
    <div class="blob two"></div>
    <div class="blob three"></div>
    <div class="dot d1"></div>
    <div class="dot d2"></div>
    <div class="dot d3"></div>
    <div class="curve"></div>

    <div class="brand-content">
      <div class="brand-title">CLOUD <span>TECH</span></div>
      <div class="brand-subtitle">CRM & FOLLOW-UP MANAGEMENT SYSTEM</div>

      <div class="welcome-left">Welcome back!</div>
      <div class="welcome-text">
        Sign in to access your follow-up dashboard, manage leads,
        track performance, and never miss an opportunity.
      </div>

      <div class="decor-line"></div>
    </div>
  </div>

  <div class="login-panel">
    <div class="login-logo">
      <img src="logo.png" alt="Cloud Tech Logo">
    </div>

    <h1>Sign In</h1>
    <p>Continue to Cloud Tech CRM</p>

    <div class="input-box">
      <label>Username</label>
      <span class="input-icon">👤</span>
      <input id="username" placeholder="Enter your username">
    </div>

    <div class="input-box">
      <label>Password</label>
      <span class="input-icon">🔒</span>
      <input id="password" type="password" placeholder="Enter your password">
    </div>

    <button class="login-btn" onclick="login()">Login</button>

    <div class="footer-text">
      © 2026 Cloud Tech. All rights reserved.
    </div>
  </div>

</div>

<script>
  if (localStorage.getItem("loggedIn")) {
    window.location.href = "index.html";
  }

  async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("loggedIn", "true");
      localStorage.setItem("username", data.username);
      localStorage.setItem("role", data.role);
      window.location.href = "index.html";
    } else {
      alert("Invalid credentials");
    }
  }
</script>

</body>
</html>
